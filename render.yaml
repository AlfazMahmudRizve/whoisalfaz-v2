# Render Blueprint Specification for n8n Production Stack
# Reference: https://render.com/docs/blueprints

services:
  - type: web
    name: n8n-automation
    env: docker
    plan: starter
    dockerfilePath: Dockerfile.n8n
    dockerContext: .
    healthCheckPath: /healthz
    numInstances: 1
    disk:
      name: n8n-storage
      mountPath: /home/node/.n8n
      sizeGB: 10
    envVars:
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_CONNECTION_STRING
        fromDatabase:
          name: n8n-db
          property: connectionString
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_PORT
        value: 5678
      - key: PORT
        value: 5678
      - key: WEBHOOK_URL
        sync: false # User will input their custom Render service URL here once assigned
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false # User will input their basic auth username
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false # User will input their secure basic auth password

databases:
  - name: n8n-db
    plan: starter
    databaseName: n8n
    user: n8n_admin
