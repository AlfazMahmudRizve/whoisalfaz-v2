# Render Blueprint Specification for n8n Free Stack
# Reference: https://render.com/docs/blueprints

services:
  - type: web
    name: n8n-automation
    env: docker
    plan: free # Switch to Free plan to bypass the credit card verification check
    dockerfilePath: Dockerfile.n8n
    dockerContext: .
    healthCheckPath: /healthz
    numInstances: 1
    envVars:
      - key: DB_TYPE
        value: postgresdb
      # Database connection variables to be linked to your Supabase PostgreSQL instance
      - key: DB_POSTGRESDB_HOST
        sync: false # User will input their Supabase Host (e.g. db.sfnvquyhsoriusyhdale.supabase.co)
      - key: DB_POSTGRESDB_PORT
        value: 5432
      - key: DB_POSTGRESDB_DATABASE
        value: postgres
      - key: DB_POSTGRESDB_USER
        value: postgres
      - key: DB_POSTGRESDB_PASSWORD
        sync: false # User will input their Supabase Database password
      - key: N8N_ENCRYPTION_KEY
        generateValue: true
      - key: N8N_PORT
        value: 5678
      - key: PORT
        value: 5678
      - key: WEBHOOK_URL
        sync: false # User will input their custom Render service URL here once assigned
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false # User will input their basic auth username
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false # User will input their secure basic auth password
